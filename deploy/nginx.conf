map $http_x_api_proxy_target $dynamic_api_proxy_target {
    default "";
    "~^https?://.+" $http_x_api_proxy_target;
}

server {
    listen ${HOST}:${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 600m;
    add_header Referrer-Policy "unsafe-url" always;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # 静态资源长缓存（Vite 生成的带 hash 文件名）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # BEGIN API PROXY
    # API 代理。前端请求同源 /api-proxy/...，由 Nginx 转发到部署时配置的 API_PROXY_URL。
    # 如果 ENABLE_DYNAMIC_API_PROXY=true，前端可通过 X-Api-Proxy-Target 指定当前服务商的 API URL。
    location /api-proxy/ {
        limit_except GET POST OPTIONS {
            deny all;
        }

        if ($uri = "/api-proxy/") {
            return 403 "Forbidden: API Proxy path required";
        }

        set $api_proxy_target "${API_PROXY_URL}";
        if ("${ENABLE_DYNAMIC_API_PROXY}" = "true") {
            set $api_proxy_target $dynamic_api_proxy_target;
        }
        if ($api_proxy_target = "") {
            return 400 "Bad Request: API proxy target is not configured";
        }

        rewrite ^/api-proxy/(.*)$ /$1 break;
        resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
        proxy_pass $api_proxy_target$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Api-Proxy-Target "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }
    # END API PROXY

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
